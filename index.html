<!DOCTYPE html>
<html lang="en" data-accent-color="default">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dk0f2y0hu/image/upload/v1757687903/Group_1_jo8blc.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nextwiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-sans: 'Inter', sans-serif;
        --font-mono: 'Courier Prime', monospace;

        /* Theme Colors */
        --bg-dark: #0D0D0D;
        --text-primary-dark: #EAEAEA;
        --text-secondary-dark: #888888;
        --surface-dark: rgba(255, 255, 255, 0.05);
        --border-dark: rgba(255, 255, 255, 0.1);
        --logo-dark: url('https://res.cloudinary.com/dk0f2y0hu/image/upload/v1756230099/nextwiki/Polygon_1_d88p22.png');
        --settings-icon-dark: url('https://res.cloudinary.com/dk0f2y0hu/image/upload/v1756296765/nextwiki/icons8-impostazioni-480-2_jzmzvg.png');
        
        --bg-light: #F5F5F7;
        --text-primary-light: #1D1D1F;
        --text-secondary-light: #6E6E73;
        --surface-light: rgba(0, 0, 0, 0.03);
        --border-light: rgba(0, 0, 0, 0.1);
        --logo-light: url('https://res.cloudinary.com/dk0f2y0hu/image/upload/v1756230169/nextwiki/Polygon_1_murjcz.png');
        --settings-icon-light: url('https://res.cloudinary.com/dk0f2y0hu/image/upload/v1756296766/nextwiki/icons8-impostazioni-480_esbdwd.png');

        /* Accent Colors */
        --accent-default-dark: var(--text-primary-dark);
        --accent-default-light: var(--text-primary-light);
        --accent-blue: #0A84FF;
        --accent-green: #30D158;
        --accent-yellow: #FFD60A;
        --accent-pink: #FF375F;
        --accent-orange: #FF9F0A;
         --accent-red: #FF453A;
         --accent-red-dark: #FF6B6B;
        --accent-purple: #BF5AF2;

        /* Default to Dark Theme */
        --bg: var(--bg-dark);
        --text-primary: var(--text-primary-dark);
        --text-secondary: var(--text-secondary-dark);
        --accent-base: var(--accent-default-dark);
        --surface: var(--surface-dark);
        --border: var(--border-dark);
        --logo-url: var(--logo-dark);
        --settings-icon-url: var(--settings-icon-dark);
      }

      html.light-theme {
        --bg: var(--bg-light);
        --text-primary: var(--text-primary-light);
        --text-secondary: var(--text-secondary-light);
        --accent-base: var(--accent-default-light);
        --surface: var(--surface-light);
        --border: var(--border-light);
        --logo-url: var(--logo-light);
        --settings-icon-url: var(--settings-icon-light);
      }
      
      /* Dynamic Accent Color via JS */
      html[data-accent-color="blue"] { --accent-base: var(--accent-blue); }
      html[data-accent-color="green"] { --accent-base: var(--accent-green); }
      html[data-accent-color="yellow"] { --accent-base: var(--accent-yellow); }
      html[data-accent-color="pink"] { --accent-base: var(--accent-pink); }
      html[data-accent-color="orange"] { --accent-base: var(--accent-orange); }
      html[data-accent-color="red"] { --accent-base: var(--accent-red); }
      html[data-accent-color="purple"] { --accent-base: var(--accent-purple); }

      /* Final accent color used by components */
      :root {
        --accent: var(--accent-base);
      }
      
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
      @keyframes blink { from, to { opacity: 1 } 50% { opacity: 0; } }
      @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(3deg); } }
      @keyframes floatReverse { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(15px) rotate(-2deg); } }
      @keyframes drift { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 25% { transform: translate(10px, -15px) rotate(5deg); } 50% { transform: translate(-5px, -25px) rotate(-3deg); } 75% { transform: translate(-15px, -10px) rotate(2deg); } }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
      @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.05); } 50% { box-shadow: 0 0 35px rgba(255,255,255,0.1); } }
      html.light-theme .homepage-search-container .search-container { animation: none; border-color: rgba(0,0,0,0.15); }
      html.light-theme .homepage-search-container .search-container:focus-within { border-color: var(--accent); }
      @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      body {
        background-color: var(--bg);
        color: var(--text-primary);
        font-family: var(--font-sans);
        font-size: 1.1rem;
        line-height: 1.7;
        margin: 0;
        padding: 2rem 2rem 7rem 2rem;
        overflow-x: hidden;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      #root { max-width: 70ch; margin: auto; }
      h1, h2, h3 { font-size: 1em; margin: 0; font-weight: 500; }
      button { background: none; border: none; padding: 0; font: inherit; color: inherit; cursor: pointer; }

      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        animation: fadeIn 0.5s ease-out;
        transition: all 0.3s ease;
      }
      
      /* --- Sticky Header Feature --- */
      .app-header.sticky-scrolled {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        margin-bottom: 0;
        padding: 0.75rem 2rem;
        background-color: rgba(var(--bg-rgb, 13, 13, 13), 0.85); /* fallback */
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        z-index: 1000;
        border-bottom: 1px solid var(--border);
      }
      
      html.light-theme .app-header.sticky-scrolled {
        background-color: rgba(245, 245, 247, 0.85);
      }

      .header-search-compact {
        flex: 1;
        max-width: 500px;
        margin: 0 1.5rem;
        opacity: 0;
        visibility: hidden;
        transform: translateY(10px);
        transition: all 0.3s ease;
        pointer-events: none;
      }
      
      .app-header.sticky-scrolled .header-search-compact {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
        pointer-events: auto;
      }
      
      .app-header.sticky-scrolled .header-search-compact .search-container {
        margin-bottom: 0;
        padding: 0.4rem 0.75rem;
        border-radius: 999px;
      }

      .main-search-wrapper {
        transition: opacity 0.3s ease, transform 0.3s ease, pointer-events 0s 0s;
        transform-origin: top;
      }
      .main-search-wrapper.hidden {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s ease, pointer-events 0s 0.3s;
      }
      
      /* Collapse user pill slightly when scrolled */
      .app-header.sticky-scrolled .user-name-text {
        display: none;
      }
      
      /* Add padding to body when header is sticky to prevent content jump */
      body:has(.app-header.sticky-scrolled) {
        padding-top: 6rem; /* 2rem normal padding + header height approx */
      }

      .logo-container { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: var(--text-primary); cursor: pointer; }
      .logo-container h1 { font-size: 1.5rem; font-weight: 500; letter-spacing: -0.02em; }
      .logo-image { width: 24px; height: 24px; background-image: var(--logo-url); background-size: contain; background-repeat: no-repeat; transition: background-image 0.3s ease; }
      
       .header-controls { display: flex; align-items: center; gap: 0.5rem; }
        .user-toggle, .theme-toggle, .info-toggle, .settings-toggle {
          width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: var(--surface);
          border: 1px solid var(--border); transition: background-color 0.2s ease, border-color 0.2s ease;
        }
      
       /* User Toggle Hover */
       .user-toggle:hover {
         background-color: var(--accent);
         border-color: var(--accent);
       }
       .user-toggle:hover svg { color: var(--bg); }

       /* User Pill Styles */
       .user-pill {
         min-width: 32px;
         height: 32px;
         transition: all 0.2s ease;
       }
       .user-pill:hover {
         background-color: var(--accent-red) !important;
         border-color: var(--accent-red) !important;
         color: white !important;
         transform: scale(1.02);
       }

        /* Theme Toggle Hover */
        .theme-toggle:hover { background-color: var(--accent); border-color: var(--accent); }
        .theme-toggle:hover svg { color: var(--bg); }

        /* Info Toggle Hover */
        .info-toggle:hover { background-color: var(--accent); border-color: var(--accent); }
        .info-toggle:hover svg { color: var(--bg); }

        /* Settings Toggle Hover */
       .settings-toggle:hover {
         background-color: var(--accent);
         border-color: var(--accent);
       }
      html.light-theme .settings-toggle:hover .settings-icon-img {
        background-image: var(--settings-icon-dark);
      }
      html.dark-theme .settings-toggle:hover .settings-icon-img {
        background-image: var(--settings-icon-light);
      }
      .settings-icon-img {
        width: 18px; height: 18px; background-image: var(--settings-icon-url); background-size: contain; background-repeat: no-repeat;
        background-position: center; transition: background-image 0.3s ease;
      }      

      .search-container {
        display: flex; align-items: center; gap: 1rem; padding: 0.5rem 0.75rem; background-color: var(--surface); border: 1px solid var(--border);
        border-radius: 999px; position: sticky; top: 1rem; z-index: 10; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); margin-bottom: 2rem;
      }
      .search-form { flex-grow: 1; display: flex; align-items: center; gap: 0.5rem; }
      .search-icon { width: 20px; height: 20px; color: var(--text-secondary); }
      .search-input { width: 100%; padding: 0.5rem; font-size: 1.1rem; color: inherit; border: none; background-color: transparent; box-sizing: border-box; outline: none; }
      .search-input:disabled { color: var(--text-secondary); }
      .search-input::placeholder { color: var(--text-secondary); opacity: 1; }

      .history-container { margin-bottom: 2rem; animation: fadeIn 0.5s ease-out; }
      .history-title { font-size: 0.9em; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
      .history-items { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: flex-start; }
      .history-item { font-size: 0.9em; padding: 0.25rem 0.25rem 0.25rem 0.75rem; background-color: var(--surface); border: 1px solid var(--border); border-radius: 999px; transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease; display: inline-flex; align-items: center; gap: 0.25rem; }
      .history-item-text { cursor: pointer; padding-right: 0.25rem; }
      .history-item:hover { background-color: var(--accent); border-color: var(--accent); color: var(--bg); }
      .history-item-delete { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; opacity: 0.6; transition: all 0.2s ease; cursor: pointer; }
      .history-item-delete:hover { opacity: 1; background-color: rgba(0,0,0,0.1); }
      html.dark-theme .history-item-delete:hover { background-color: rgba(255,255,255,0.2); }
      
      .image-container {
        width: 100%; aspect-ratio: 16 / 9; background-color: var(--surface); border-radius: 12px; margin-bottom: 2rem; overflow: hidden;
        display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);
      }
      .image-display { width: 100%; height: 100%; object-fit: cover; animation: fadeIn 0.5s ease; }
      .image-skeleton {
        width: 100%; height: 100%; background-image: linear-gradient(to right, var(--surface) 0%, var(--border) 20%, var(--surface) 40%, var(--surface) 100%);
        background-repeat: no-repeat; background-size: 2000px 100%; animation: shimmer 2s linear infinite;
      }
      .image-error { color: var(--text-secondary); text-align: center; padding: 1rem; }

      .error-box { border: 1px solid var(--accent-red); padding: 1rem; color: var(--accent-red); border-radius: 8px; }

      main > div { animation: fadeIn 0.5s ease-out 0.2s; animation-fill-mode: backwards; }
      .interactive-word {
        color: var(--text-primary); text-decoration: none; border-bottom: 1px solid var(--border); transition: all 0.2s ease-in-out;
        padding: 0.1em 0.2em; margin: -0.1em -0.2em; border-radius: 4px;
      }
      .interactive-word:hover { color: var(--bg); background-color: var(--accent); border-bottom-color: var(--accent); }
      .blinking-cursor { color: var(--accent); animation: blink 1s step-end infinite; }

      .skeleton-bar {
        height: 1rem; background-color: var(--surface); margin-bottom: 0.75rem; border-radius: 4px;
        background-image: linear-gradient(to right, var(--surface) 0%, var(--border) 20%, var(--surface) 40%, var(--surface) 100%);
        background-repeat: no-repeat; background-size: 2000px 104px; animation: shimmer 2s linear infinite;
      }
      
      .sticky-footer {
        position: fixed; bottom: 0; left: 0; right: 0; width: 100%; text-align: center; padding: 1rem 0;
        border-top: 1px solid var(--border); background-color: rgba(13, 13, 13, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      }
      html.light-theme .sticky-footer { background-color: rgba(245, 245, 247, 0.7); }
      .footer-text { font-size: 0.9em; color: var(--text-secondary); }
      .footer-text a { color: inherit; text-decoration: none; transition: color 0.2s ease-in-out; }
      .footer-text a:hover { color: var(--accent); text-decoration: underline; }

      /* ====== HOMEPAGE STYLES ====== */
      body:has(> #root > div > .homepage) {
        overflow-y: hidden;
      }
      .homepage {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 80vh; position: relative;
      }
      .homepage-brand {
        display: flex; align-items: center; gap: 1.25rem;
        margin-bottom: 2.5rem;
        animation: fadeInUp 0.8s ease-out;
      }
      .homepage-logo {
        width: 72px; height: 72px;
        background-image: var(--logo-url); background-size: contain; background-repeat: no-repeat;
        transition: background-image 0.3s ease;
        flex-shrink: 0;
      }
      .homepage-title {
        font-size: 3.2rem; font-weight: 600; letter-spacing: -0.03em;
        color: var(--text-primary);
        margin: 0;
      }
      .homepage-search-container {
        width: 100%; max-width: 560px;
        animation: scaleIn 0.6s ease-out 0.2s both;
      }
      .homepage-search-container .search-container {
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        animation: glowPulse 3s ease-in-out infinite;
      }
      .homepage-search-container .search-input {
        font-size: 1.25rem; padding: 0.65rem;
      }
      .homepage-search-container .search-icon {
        width: 24px; height: 24px;
      }
      .homepage-history {
        margin-top: 2rem; width: 100%; max-width: 560px;
        animation: fadeInUp 0.8s ease-out 0.4s both;
      }
      .homepage-history .history-container { margin-bottom: 0; text-align: left; }
      .homepage-history .history-items { justify-content: flex-start; }
      .homepage-subtitle {
        color: var(--text-secondary); font-size: 1rem; margin-bottom: 2rem;
        animation: fadeInUp 0.8s ease-out 0.15s both;
        font-weight: 400; letter-spacing: 0.01em;
      }

      /* ====== FLOATING 3D SHAPES ====== */
      .floating-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
      .floating-shape {
        position: absolute; border-radius: 20%;
        background: var(--text-primary);
      }
      /* Dark mode: more visible shapes */
      .floating-shape { opacity: 0.08; }
      /* Light mode: subtle but visible */
      html.light-theme .floating-shape { opacity: 0.06; background: #000; }
      .shape-1 { width: 140px; height: 140px; top: 8%; left: 5%; filter: blur(2px); animation: drift 18s ease-in-out infinite; border-radius: 30%; }
      .shape-2 { width: 90px; height: 90px; top: 12%; right: 10%; filter: blur(8px); animation: float 14s ease-in-out infinite 2s; border-radius: 50%; }
      .shape-3 { width: 180px; height: 180px; bottom: 18%; left: 6%; filter: blur(12px); animation: floatReverse 20s ease-in-out infinite 1s; border-radius: 35%; }
      .shape-4 { width: 70px; height: 70px; top: 48%; right: 8%; filter: blur(1px); animation: drift 15s ease-in-out infinite 3s; border-radius: 25%; }
      .shape-5 { width: 220px; height: 220px; bottom: 3%; right: 12%; filter: blur(16px); animation: float 22s ease-in-out infinite 4s; border-radius: 40%; }
      .shape-6 { width: 50px; height: 50px; top: 28%; left: 22%; filter: blur(1px); animation: drift 12s ease-in-out infinite 1.5s; border-radius: 50%; }
      .shape-7 { width: 110px; height: 110px; top: 68%; left: 38%; filter: blur(10px); animation: floatReverse 17s ease-in-out infinite 5s; border-radius: 28%; }
      .shape-8 { width: 75px; height: 75px; top: 6%; left: 52%; filter: blur(4px); animation: float 16s ease-in-out infinite 2.5s; border-radius: 45%; }
      .shape-9 { width: 100px; height: 100px; bottom: 32%; right: 28%; filter: blur(6px); animation: drift 19s ease-in-out infinite 3.5s; border-radius: 32%; }
      .homepage > * { position: relative; z-index: 1; }

      @media (max-width: 768px) {
        .homepage-logo { width: 52px; height: 52px; }
        .homepage-title { font-size: 2.2rem; }
        .homepage-search-container { max-width: 90%; }
        .homepage-search-container .search-input { font-size: 1.1rem; }
        .shape-1, .shape-5 { display: none; }
        .theme-toggle.header-theme-toggle { display: none; }
        
        .app-header.sticky-scrolled .header-search-compact { display: none; }
        .main-search-wrapper.hidden {
            opacity: 1;
            transform: none;
            pointer-events: auto;
        }
      }

      /* Settings Modal */
      .modal-backdrop {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        display: flex; align-items: center; justify-content: center; z-index: 1000;
        animation: fadeIn 0.3s ease;
      }
      .modal-content {
        background-color: var(--bg); border: 1px solid var(--border); border-radius: 16px;
        padding: 1.5rem; width: 90%; max-width: 400px;
        display: flex; flex-direction: column; gap: 1.5rem;
        box-sizing: border-box;
      }
      .modal-section-title {
        font-size: 0.9em; color: var(--text-secondary); font-weight: 500;
        text-transform: uppercase; letter-spacing: 0.05em; margin: 0; margin-bottom: 0.75rem;
      }
      .color-swatches { display: flex; flex-wrap: wrap; gap: 0.75rem; }
      .color-swatch {
        width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent;
        cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease;
        display: flex; align-items: center; justify-content: center;
      }
      .color-swatch:hover { transform: scale(1.1); }
      .color-swatch.active { border-color: var(--surface-light); }
      .color-swatch svg { width: 16px; height: 16px; color: white; }
      
      #swatch-default { background-color: var(--text-primary); border-color: var(--border); }
      #swatch-default.active { border-color: var(--accent-blue); }
      #swatch-blue { background-color: var(--accent-blue); }
      #swatch-green { background-color: var(--accent-green); }
      #swatch-yellow { background-color: var(--accent-yellow); }
      #swatch-pink { background-color: var(--accent-pink); }
      #swatch-orange { background-color: var(--accent-orange); }
      #swatch-red { background-color: var(--accent-red); }
      #swatch-purple { background-color: var(--accent-purple); }

      /* Custom Language Select */
      .custom-select-container { position: relative; }
      .custom-select-trigger {
        width: 100%;
        padding: 0.75rem;
        font-size: 1rem;
        border-radius: 8px;
        background-color: var(--surface);
        color: var(--text-primary);
        border: 1px solid var(--border);
        outline: none;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: border-color 0.2s ease;
        box-sizing: border-box;
      }
      .custom-select-trigger:hover, .custom-select-container.open .custom-select-trigger {
        border-color: var(--accent);
      }
      .custom-select-arrow {
        width: 1em;
        height: 1em;
        color: var(--text-secondary);
        transition: transform 0.2s ease;
      }
      .custom-select-container.open .custom-select-arrow {
        transform: rotate(180deg);
      }
      .custom-select-options {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background-color: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        z-index: 1001;
        max-height: 200px;
        overflow-y: auto;
        list-style: none;
        padding: 0.5rem;
        margin: 0;
        animation: fadeIn 0.2s ease;
      }
      .custom-select-option {
        padding: 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s ease, color 0.2s ease;
        color: var(--text-primary);
      }
      .custom-select-option:hover {
        background-color: var(--surface);
      }
      .custom-select-option.selected {
        background-color: var(--accent);
        color: var(--bg);
      }
      
      /* Modal Actions */
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 0.5rem;
      }
      .save-button {
        padding: 0.6rem 1.2rem;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        background-color: var(--accent);
        color: var(--bg);
        transition: background-color 0.2s ease, transform 0.2s ease;
      }
      .save-button:hover {
        filter: brightness(1.1);
        transform: scale(1.02);
      }
    </style>
  <script type="importmap">
